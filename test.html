<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<h1>Test Page</h1>
<p id="status">Testing...</p>
<p id="rows"></p>
<script>
const URL = 'https://raw.githubusercontent.com/Sandy368368/vehicle-search/main/vehicles.xlsx';
fetch(URL)
  .then(r => r.arrayBuffer())
  .then(buf => {
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    document.getElementById('status').textContent = 'Success! Rows found: ' + rows.length;
    document.getElementById('rows').textContent = 'Columns: ' + Object.keys(rows[0]).join(', ');
  })
  .catch(e => {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  });
</script>
</body>
</html>
